<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">


        <div id="display">

            <p id="output" readonly>0</p>
        </div>
        <div class="row">
            <tr>
                <th><input type="button" value="7" onclick="display(7)"></th>
                <th><input type="button" value="8" onclick="display(8)"></th>
                <th><input type="button" value="9" onclick="display(9)"></th>
                <th><input type="button" value="+" onclick="character('+')"> </th>
            </tr>
        </div>
        <div class="row">
            <tr>
                <th><input type="button" value="4" onclick="display(4)"></th>
                <th><input type="button" value="5" onclick="display(5)"></th>
                <th><input type="button" value="6" onclick="display(6)"></th>
                <th><input type="button" value="-" onclick="character('-')"></th>
            </tr>
        </div>
        <div class="row">
            <tr>
                <th><input type="button" value="1" onclick="display(1)"></th>
                <th><input type="button" value="2" onclick="display(2)"></th>
                <th><input type="button" value="3" onclick="display(3)"></th>
                <th><input type="button" value="/" onclick="character('/')"></th>
            </tr>
        </div>

        <div class="row">
            <tr>
                <th><input type="button" value="0" onclick="display(0)"></th>
                <th><input type="button" value="." onclick="character('.')"></th>
                <th><input type="button" value="ce" onclick="cut()"></th>
                <th><input type="button" value="*" onclick="character('*')"></th>
            </tr>
        </div>

        <div class="row">
            <tr>
                <th><input type="button" value="ENTER" onclick="solution()"></th>
                <th><input type="button" value="clear" onclick="clearInput()"></th>
            </tr>
        </div>



    </div>



    <script>
        {
            let number = "";
            let onoff = true;
            let final;
            function display(digit) {
                onoff = true;
                number += digit;
                document.getElementById("output").innerHTML = number;
            }

            function character(char) {
                if (onoff == false) {
                    alert("YOU CAN NOT TYPE ANY CHARACTER TWICE CONTINIOUSLY");
                }
                else if (onoff == true) {
                    number += char;
                    document.getElementById("output").innerHTML = number;
                }
                onoff = false;
            }
            function clearInput() {

                document.getElementById("output").innerHTML = "0";
                number = "";
            }

            function solution() {
                final = eval(number);
                number = final.toString();


                document.getElementById("output").innerHTML = final;

            }
            function cut() {
                if (number.length >= 2) {
                    number = number.slice(0, -1);
                    document.getElementById("output").innerHTML = number;
                }
                else {
                    number = "0";
                    document.getElementById("output").innerHTML = number;
                }


            }
        }
    </script>


</body>

</html>
